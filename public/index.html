<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DistanceViewer Web</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; background: #f5f7fb; color: #1f2937; }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
      align-items: start;
    }
    .toolbar.hidden { display: none; }
    .control-group {
      background: #ffffff;
      border: 1px solid #d8e0ea;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 1px 3px rgba(16, 24, 40, 0.06);
    }
    .control-title {
      margin: 0 0 10px;
      font-size: 15px;
      color: #0f4c81;
    }
    .control-grid {
      display: grid;
      gap: 6px;
    }
    .inline-fields {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    label {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 14px;
    }
    .button-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 6px;
    }
    button {
      border: 1px solid #c5d3e3;
      background: #f8fbff;
      color: #0b3a66;
      border-radius: 6px;
      padding: 6px 8px;
      width: 100%;
      cursor: pointer;
    }
    button:hover {
      background: #edf5ff;
    }
    .view-controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
    #mapPane { width: min(92vw, 78vh); margin: 0 auto; }
    #mapPane:fullscreen {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      padding: 16px;
      box-sizing: border-box;
    }
    #mapPane:fullscreen #chart {
      width: min(calc(100vw - 32px), calc(100vh - 32px));
      height: min(calc(100vw - 32px), calc(100vh - 32px));
    }
    #chart { width: min(92vw, 78vh); height: min(92vw, 78vh); margin: 0 auto; }
    .hint { color: #555; font-size: 14px; }
    .status { margin: 8px 0 12px; color: #0f5132; background: #d1e7dd; border: 1px solid #badbcc; border-radius: 4px; padding: 8px 10px; min-height: 18px; }
    .status.error { color: #842029; background: #f8d7da; border-color: #f5c2c7; }
    #saveName { width: 100%; max-width: 260px; }
    #saveList { min-width: 220px; }
  </style>
</head>
<body>
  <h2>DistanceViewer（Web 版）</h2>
  <div class="toolbar">
    <section class="control-group">
      <h3 class="control-title">篩選與新增</h3>
      <div class="control-grid">
        <label>資源
          <select id="resource"></select>
        </label>
        <label>神蹟
          <select id="wonder"></select>
        </label>
        <label>X 範圍
          <span class="inline-fields">
            <input id="xMin" type="number" min="0" max="100" value="0" style="width:70px" />
            ~
            <input id="xMax" type="number" min="0" max="100" value="100" style="width:70px" />
          </span>
        </label>
        <label>Y 範圍
          <span class="inline-fields">
            <input id="yMin" type="number" min="0" max="100" value="0" style="width:70px" />
            ~
            <input id="yMax" type="number" min="0" max="100" value="100" style="width:70px" />
          </span>
        </label>
        <div class="button-row">
          <button id="addFiltered">新增符合條件點</button>
          <button id="clear">清空所有點</button>
        </div>
      </div>
    </section>

    <section class="control-group">
      <h3 class="control-title">視覺與標記</h3>
      <div class="control-grid">
        <label>新增點顏色
          <input id="newPointColor" type="color" value="#1f77b4" />
        </label>
        <label>關注目標色
          <input id="focusColor" type="color" value="#d62728" />
        </label>
        <label>註解文字色
          <input id="annotationTextColor" type="color" value="#7c3aed" />
        </label>
        <label>註解底色
          <input id="annotationBgColor" type="color" value="#fff4d6" />
        </label>
        <label>註解字型
          <input id="annotationFontFamily" type="text" value="Arial, sans-serif" />
        </label>
        <label>註解字級
          <input id="annotationFontSize" type="number" min="10" max="48" value="16" style="width:90px" />
        </label>
        <div class="button-row">
          <button id="setFocusPoint">點選點設為關注目標</button>
          <button id="setAnnotationPoint">點選點編輯註解</button>
          <button id="toggleEdges">切換邊線</button>
          <button id="toggleLabels">切換標籤</button>
          <button id="toggleAnnotations">切換註解顯示</button>
        </div>
      </div>
    </section>

    <section class="control-group">
      <h3 class="control-title">版本管理</h3>
      <div class="control-grid">
        <input id="saveName" type="text" placeholder="存檔名稱（例：主城圈）" />
        <div class="button-row">
          <button id="saveAs">另存新版本</button>
          <button id="save">覆寫目前版本</button>
        </div>
        <select id="saveList"></select>
        <div class="button-row">
          <button id="load">載入選取版本</button>
          <button id="renameSave">重新命名</button>
          <button id="deleteSave">刪除版本</button>
        </div>
        <div class="button-row">
          <button id="exportSave">匯出到本機</button>
          <button id="importSave">匯入檔案到瀏覽器</button>
          <input id="importFile" type="file" accept="application/json" style="display:none" />
        </div>
      </div>
    </section>
  </div>
  <div class="view-controls">
    <button id="toggleToolbar">隱藏工具列</button>
    <button id="toggleFullscreen">地圖全螢幕</button>
  </div>
  <p class="hint">左鍵點圖可刪除點（或在關注模式設定關注色），右鍵可新增/刪除。座標範圍：0~100。</p>
  <div id="status" class="status">準備就緒。</div>
  <div id="mapPane">
    <div id="chart"></div>
  </div>

<script>
let selectedPoints = [];
let showEdges = true;
let showLabels = true;
let focusMode = false;
let annotationMode = false;
let showAnnotations = true;
let toolbarVisible = true;
let chartInitialized = false;
const STORAGE_KEY = 'distanceViewerSavesV2';
let activeSaveId = '';
let currentViewRange = null;

function endpoint(path) { return path; }
function getNewPointColor() { return document.getElementById('newPointColor').value; }
function getFocusColor() { return document.getElementById('focusColor').value; }
function getAnnotationTextColor() { return document.getElementById('annotationTextColor').value; }
function getAnnotationBgColor() { return document.getElementById('annotationBgColor').value; }
function getAnnotationFontFamily() {
  return (document.getElementById('annotationFontFamily').value || '').trim() || 'Arial, sans-serif';
}
function getAnnotationFontSize() {
  const value = Number(document.getElementById('annotationFontSize').value);
  if (!Number.isFinite(value)) return 16;
  return Math.min(48, Math.max(10, Math.round(value)));
}
function toCoordNumber(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : NaN;
}
function getConfiguredRange() {
  const xMin = Math.round(toCoordNumber(document.getElementById('xMin').value));
  const xMax = Math.round(toCoordNumber(document.getElementById('xMax').value));
  const yMin = Math.round(toCoordNumber(document.getElementById('yMin').value));
  const yMax = Math.round(toCoordNumber(document.getElementById('yMax').value));
  const isValid = [xMin, xMax, yMin, yMax].every(Number.isFinite)
    && 0 <= xMin && xMin <= xMax && xMax <= 100
    && 0 <= yMin && yMin <= yMax && yMax <= 100;
  if (!isValid) {
    return { xMin: 0, xMax: 100, yMin: 0, yMax: 100, isValid: false };
  }
  return { xMin, xMax, yMin, yMax, isValid: true };
}
function setStatus(message, isError = false) {
  const box = document.getElementById('status');
  box.textContent = message;
  box.classList.toggle('error', isError);
}
function formatTimeLabel(isoText) {
  if (!isoText) return '未知時間';
  const date = new Date(isoText);
  if (Number.isNaN(date.getTime())) return '未知時間';
  return date.toLocaleString('zh-Hant-TW', { hour12: false });
}
function clonePoints(points) {
  return (points || []).map((p) => ({
    x: Number(p.x),
    y: Number(p.y),
    resource: p.resource || '',
    wonder: p.wonder || '',
    color: p.color || getNewPointColor(),
    note: p.note || '',
  })).filter((p) => Number.isFinite(p.x) && Number.isFinite(p.y));
}
function readSaveStore() {
  const fallback = { saves: [] };
  try {
    const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (!parsed || typeof parsed !== 'object' || !Array.isArray(parsed.saves)) return fallback;
    return { saves: parsed.saves };
  } catch {
    return fallback;
  }
}
function writeSaveStore(store) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ saves: store.saves || [] }));
}
function getSelectedSaveId() {
  return document.getElementById('saveList').value || '';
}
function getSaveNameInput() {
  return (document.getElementById('saveName').value || '').trim();
}
function refreshSaveList(preferredId = activeSaveId) {
  const select = document.getElementById('saveList');
  const store = readSaveStore();
  const saves = [...store.saves].sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
  if (!saves.length) {
    select.innerHTML = '<option value="">（尚無存檔）</option>';
    select.value = '';
    activeSaveId = '';
    return;
  }
  select.innerHTML = saves.map((save) => (
    `<option value="${save.id}">${save.name || '未命名'}｜${formatTimeLabel(save.updatedAt)}</option>`
  )).join('');
  const exists = saves.some((save) => save.id === preferredId);
  select.value = exists ? preferredId : saves[0].id;
  activeSaveId = select.value;
}
function saveCurrentAsNewVersion(name) {
  const trimmedName = (name || '').trim();
  if (!trimmedName) throw new Error('請先輸入存檔名稱。');
  const now = new Date().toISOString();
  const store = readSaveStore();
  const item = {
    id: `save_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
    name: trimmedName,
    createdAt: now,
    updatedAt: now,
    points: clonePoints(selectedPoints),
  };
  store.saves.push(item);
  writeSaveStore(store);
  activeSaveId = item.id;
  refreshSaveList(item.id);
}
function overwriteSelectedVersion() {
  const saveId = getSelectedSaveId();
  if (!saveId) throw new Error('請先選擇要覆寫的版本。');
  const store = readSaveStore();
  const target = store.saves.find((save) => save.id === saveId);
  if (!target) throw new Error('找不到指定版本。');
  target.points = clonePoints(selectedPoints);
  target.updatedAt = new Date().toISOString();
  const renamed = getSaveNameInput();
  if (renamed) target.name = renamed;
  writeSaveStore(store);
  refreshSaveList(saveId);
}
function loadSelectedVersion() {
  const saveId = getSelectedSaveId();
  if (!saveId) throw new Error('目前沒有可載入的版本。');
  const store = readSaveStore();
  const target = store.saves.find((save) => save.id === saveId);
  if (!target) throw new Error('找不到指定版本。');
  selectedPoints = clonePoints(target.points);
  activeSaveId = saveId;
  document.getElementById('saveName').value = target.name || '';
}
function renameSelectedVersion(newName) {
  const saveId = getSelectedSaveId();
  const trimmedName = (newName || '').trim();
  if (!saveId) throw new Error('請先選擇版本。');
  if (!trimmedName) throw new Error('請輸入新名稱。');
  const store = readSaveStore();
  const target = store.saves.find((save) => save.id === saveId);
  if (!target) throw new Error('找不到指定版本。');
  target.name = trimmedName;
  target.updatedAt = new Date().toISOString();
  writeSaveStore(store);
  refreshSaveList(saveId);
}
function deleteSelectedVersion() {
  const saveId = getSelectedSaveId();
  if (!saveId) throw new Error('請先選擇要刪除的版本。');
  const store = readSaveStore();
  const nextSaves = store.saves.filter((save) => save.id !== saveId);
  if (nextSaves.length === store.saves.length) throw new Error('找不到指定版本。');
  writeSaveStore({ saves: nextSaves });
  refreshSaveList(nextSaves[0]?.id || '');
}
function buildExportPayload() {
  const saveId = getSelectedSaveId();
  const store = readSaveStore();
  const target = store.saves.find((save) => save.id === saveId);
  if (!target) throw new Error('請先選擇要匯出的版本。');
  return {
    format: 'distanceViewer.save.v2',
    exportedAt: new Date().toISOString(),
    save: {
      ...target,
      points: clonePoints(target.points),
    },
  };
}
function importSavePayload(payload) {
  if (!payload || typeof payload !== 'object') throw new Error('檔案內容格式錯誤。');
  const save = payload.save;
  if (!save || typeof save !== 'object') throw new Error('檔案缺少 save 區塊。');
  const store = readSaveStore();
  const imported = {
    id: `save_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
    name: `${save.name || '匯入版本'}（匯入）`,
    createdAt: save.createdAt || new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    points: clonePoints(save.points),
  };
  store.saves.push(imported);
  writeSaveStore(store);
  activeSaveId = imported.id;
  refreshSaveList(imported.id);
  document.getElementById('saveName').value = imported.name;
}
async function withStatus(message, action, doneMessage = '完成。') {
  try {
    setStatus(message, false);
    const result = await action();
    setStatus(doneMessage, false);
    return result;
  } catch (err) {
    setStatus(`${message}失敗：${err.message || err}`, true);
    throw err;
  }
}
function syncFocusButtonText() {
  document.getElementById('setFocusPoint').textContent = focusMode
    ? '關注模式：開（點一下點可上色）'
    : '關注模式：關';
}
function syncAnnotationButtonText() {
  document.getElementById('setAnnotationPoint').textContent = annotationMode
    ? '註解模式：開（點一下點可編輯）'
    : '註解模式：關';
}
function syncAnnotationVisibilityText() {
  document.getElementById('toggleAnnotations').textContent = showAnnotations
    ? '註解顯示：開'
    : '註解顯示：關';
}
function syncViewControlText() {
  document.getElementById('toggleToolbar').textContent = toolbarVisible
    ? '隱藏工具列'
    : '顯示工具列';
  document.getElementById('toggleFullscreen').textContent = document.fullscreenElement
    ? '退出全螢幕'
    : '地圖全螢幕';
}

function optionHTML(items) {
  return ['<option value="">(不限)</option>', ...items.map(i => `<option value="${i}">${i}</option>`)].join('');
}

async function loadOptions() {
  await withStatus('正在載入篩選選項...', async () => {
    const r = await fetch(endpoint('/api/options'));
    const data = await r.json();
    document.getElementById('resource').innerHTML = optionHTML(data.resources || []);
    document.getElementById('wonder').innerHTML = optionHTML(data.wonders || []);
  }, '篩選選項載入完成。');
}

async function addFilteredPoints() {
  const resource = document.getElementById('resource').value;
  const wonder = document.getElementById('wonder').value;
  const { xMin, xMax, yMin, yMax, isValid } = getConfiguredRange();

  if (!isValid) {
    setStatus('X / Y 範圍需在 0~100，且最小值不可大於最大值。', true);
    return;
  }

  const qs = new URLSearchParams({
    resource, wonder,
    x_min: String(xMin), x_max: String(xMax),
    y_min: String(yMin), y_max: String(yMax),
  });
  await withStatus('正在新增符合條件點...', async () => {
    const r = await fetch(endpoint(`/api/points/query?${qs.toString()}`));
    if (!r.ok) {
      const errData = await r.json().catch(() => ({}));
      throw new Error(errData.error || `HTTP ${r.status}`);
    }
    const data = await r.json();
    const existing = new Set(selectedPoints.map(p => `${p.x},${p.y}`));
    data.forEach(p => {
      const key = `${p.x},${p.y}`;
      if (!existing.has(key)) selectedPoints.push({ ...p, color: getNewPointColor() });
    });
    await redraw();
  }, '已新增符合條件點。');
}

async function triangulate(points) {
  const r = await fetch(endpoint('/api/triangulate'), {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ points })
  });
  return r.json();
}

async function redraw() {
  setStatus('正在重繪圖表...');
  const { xMin, xMax, yMin, yMax } = getConfiguredRange();
  if (!currentViewRange) {
    currentViewRange = { xMin, xMax, yMin, yMax };
  }
  const tracePoints = {
    x: selectedPoints.map(p => p.x),
    y: selectedPoints.map(p => p.y),
    mode: showLabels ? 'markers+text' : 'markers',
    type: 'scatter',
    marker: { size: 10, color: selectedPoints.map(p => p.color || 'blue') },
    text: selectedPoints.map(p => `(${p.x}, ${p.y})<br>${p.resource || ''}<br>${p.wonder || ''}`),
    textposition: 'top right',
    hovertemplate: '%{text}<extra></extra>'
  };

  const traces = [tracePoints];

  if (showAnnotations) {
    const notedPoints = selectedPoints.filter((p) => (p.note || '').trim());
    if (notedPoints.length) {
      // 註解改成 layout.annotations 以提供更顯眼樣式（底色、邊框、字型）
    }
  }
  if (showEdges && selectedPoints.length >= 3) {
    const edges = await triangulate(selectedPoints);
    edges.forEach(e => {
      traces.push({
        x: [e.x1, e.x2], y: [e.y1, e.y2], mode: 'lines', type: 'scatter',
        line: { color: '#333', width: 1 }, hovertemplate: `距離: ${e.distance}<extra></extra>`
      });
    });
  }

  const layout = {
    xaxis: { range: [currentViewRange.xMin, currentViewRange.xMax], dtick: 5 },
    yaxis: { range: [currentViewRange.yMax, currentViewRange.yMin], dtick: 5, scaleanchor: 'x', scaleratio: 1 },
    margin: { l: 40, r: 20, b: 40, t: 20 },
    showlegend: false,
    annotations: showAnnotations
      ? selectedPoints
          .filter((p) => (p.note || '').trim())
          .map((p) => ({
            x: p.x,
            y: p.y,
            text: p.note,
            xanchor: 'center',
            yanchor: 'top',
            yshift: -14,
            showarrow: true,
            arrowhead: 2,
            arrowsize: 1,
            arrowwidth: 1,
            arrowcolor: '#374151',
            bordercolor: '#7c3aed',
            borderwidth: 1.5,
            borderpad: 4,
            bgcolor: getAnnotationBgColor(),
            opacity: 0.98,
            font: {
              size: getAnnotationFontSize(),
              color: getAnnotationTextColor(),
              family: getAnnotationFontFamily(),
            },
          }))
      : [],
  };

  if (chartInitialized) {
    await Plotly.react('chart', traces, layout, { responsive: true });
  } else {
    await Plotly.newPlot('chart', traces, layout, { responsive: true });
    chartInitialized = true;
    document.getElementById('chart').on('plotly_relayout', (evt) => {
      const next = { ...currentViewRange };
      if (Array.isArray(evt['xaxis.range']) && evt['xaxis.range'].length === 2) {
        next.xMin = Number(evt['xaxis.range'][0]);
        next.xMax = Number(evt['xaxis.range'][1]);
      } else {
        if (Number.isFinite(evt['xaxis.range[0]'])) next.xMin = Number(evt['xaxis.range[0]']);
        if (Number.isFinite(evt['xaxis.range[1]'])) next.xMax = Number(evt['xaxis.range[1]']);
      }
      if (Array.isArray(evt['yaxis.range']) && evt['yaxis.range'].length === 2) {
        const y0 = Number(evt['yaxis.range'][0]);
        const y1 = Number(evt['yaxis.range'][1]);
        next.yMax = Math.max(y0, y1);
        next.yMin = Math.min(y0, y1);
      } else {
        const y0 = Number(evt['yaxis.range[0]']);
        const y1 = Number(evt['yaxis.range[1]']);
        if (Number.isFinite(y0) && Number.isFinite(y1)) {
          next.yMax = Math.max(y0, y1);
          next.yMin = Math.min(y0, y1);
        }
      }
      if (
        [next.xMin, next.xMax, next.yMin, next.yMax].every(Number.isFinite)
        && next.xMin < next.xMax
        && next.yMin < next.yMax
      ) {
        currentViewRange = next;
      }
    });
  }
  setStatus('圖表更新完成。');
}

function editPointAnnotation(point) {
  const current = point.note || '';
  const next = window.prompt('請輸入註解（留白可清除）', current);
  if (next === null) return false;
  point.note = next.trim();
  return true;
}

function togglePoint(x, y, shouldApplyFocusColor = false, shouldEditAnnotation = false) {
  x = Math.round(toCoordNumber(x)); y = Math.round(toCoordNumber(y));
  if (!Number.isFinite(x) || !Number.isFinite(y)) return;
  if (x < 0 || x > 100 || y < 0 || y > 100) return;
  const idx = selectedPoints.findIndex((p) => (
    Math.round(toCoordNumber(p.x)) === x && Math.round(toCoordNumber(p.y)) === y
  ));
  if (idx >= 0) {
    if (shouldEditAnnotation) {
      editPointAnnotation(selectedPoints[idx]);
    } else if (shouldApplyFocusColor) {
      selectedPoints[idx].color = getFocusColor();
    } else {
      selectedPoints.splice(idx, 1);
    }
  } else {
    selectedPoints.push({ x, y, resource: '', wonder: '', color: getNewPointColor(), note: '' });
  }
}

function bindEvents() {
  const toolbar = document.querySelector('.toolbar');
  const mapPane = document.getElementById('mapPane');

  document.getElementById('toggleToolbar').onclick = () => {
    toolbarVisible = !toolbarVisible;
    toolbar.classList.toggle('hidden', !toolbarVisible);
    syncViewControlText();
    Plotly.Plots.resize(document.getElementById('chart'));
  };
  document.getElementById('toggleFullscreen').onclick = async () => {
    if (document.fullscreenElement) await document.exitFullscreen();
    else await mapPane.requestFullscreen();
  };
  document.addEventListener('fullscreenchange', () => {
    syncViewControlText();
    Plotly.Plots.resize(document.getElementById('chart'));
  });

  document.getElementById('addFiltered').onclick = addFilteredPoints;
  ['xMin', 'xMax', 'yMin', 'yMax'].forEach((id) => {
    document.getElementById(id).addEventListener('change', async () => {
      const { isValid } = getConfiguredRange();
      if (!isValid) {
        setStatus('X / Y 範圍需在 0~100，且最小值不可大於最大值。', true);
        return;
      }
      const range = getConfiguredRange();
      currentViewRange = { ...range };
      await redraw();
    });
  });
  ['annotationTextColor', 'annotationBgColor', 'annotationFontFamily', 'annotationFontSize']
    .forEach((id) => {
      const eventName = id === 'annotationFontFamily' ? 'change' : 'input';
      document.getElementById(id).addEventListener(eventName, async () => {
        await redraw();
      });
    });
  document.getElementById('setFocusPoint').onclick = () => {
    focusMode = !focusMode;
    if (focusMode) annotationMode = false;
    syncFocusButtonText();
    syncAnnotationButtonText();
    setStatus(focusMode ? '已開啟關注模式，左鍵點既有點可改成關注色。' : '已關閉關注模式。');
  };
  document.getElementById('setAnnotationPoint').onclick = () => {
    annotationMode = !annotationMode;
    if (annotationMode) focusMode = false;
    syncAnnotationButtonText();
    syncFocusButtonText();
    setStatus(annotationMode ? '已開啟註解模式，左鍵點既有點可新增/修改註解。' : '已關閉註解模式。');
  };
  document.getElementById('toggleEdges').onclick = async () => { showEdges = !showEdges; await redraw(); };
  document.getElementById('toggleLabels').onclick = async () => { showLabels = !showLabels; await redraw(); };
  document.getElementById('toggleAnnotations').onclick = async () => {
    showAnnotations = !showAnnotations;
    syncAnnotationVisibilityText();
    await redraw();
  };
  document.getElementById('saveAs').onclick = () => withStatus('正在建立新版本...', async () => {
    saveCurrentAsNewVersion(getSaveNameInput());
  }, '已建立新版本。');
  document.getElementById('save').onclick = () => withStatus('正在覆寫版本...', async () => {
    overwriteSelectedVersion();
  }, '已覆寫選取版本。');
  document.getElementById('load').onclick = async () => withStatus('正在載入版本...', async () => {
    loadSelectedVersion();
    await redraw();
  }, '版本載入完成。');
  document.getElementById('renameSave').onclick = () => withStatus('正在重新命名版本...', async () => {
    renameSelectedVersion(getSaveNameInput());
  }, '版本名稱已更新。');
  document.getElementById('deleteSave').onclick = () => withStatus('正在刪除版本...', async () => {
    deleteSelectedVersion();
  }, '版本已刪除。');
  document.getElementById('saveList').addEventListener('change', () => {
    activeSaveId = getSelectedSaveId();
    const store = readSaveStore();
    const target = store.saves.find((save) => save.id === activeSaveId);
    document.getElementById('saveName').value = target?.name || '';
  });
  document.getElementById('exportSave').onclick = () => withStatus('正在匯出版本檔案...', async () => {
    const payload = buildExportPayload();
    const safeName = (payload.save.name || 'distanceViewer-save').replace(/[^\w\u4e00-\u9fa5-]+/g, '_');
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${safeName}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }, '版本已匯出到本機。');
  document.getElementById('importSave').onclick = () => {
    document.getElementById('importFile').click();
  };
  document.getElementById('importFile').addEventListener('change', (event) => withStatus('正在匯入版本檔案...', async () => {
    const file = event.target.files?.[0];
    if (!file) throw new Error('尚未選擇檔案。');
    const text = await file.text();
    const payload = JSON.parse(text);
    importSavePayload(payload);
    loadSelectedVersion();
    await redraw();
    event.target.value = '';
  }, '匯入成功，已加入瀏覽器版本並載入。'));
  document.getElementById('clear').onclick = async () => withStatus('正在清空點位...', async () => {
    selectedPoints = [];
    await redraw();
  }, '點位已清空。');

  document.getElementById('chart').on('plotly_click', async (eventData) => {
    const pt = eventData.points?.[0];
    if (!pt) return;
    togglePoint(pt.x, pt.y, focusMode, annotationMode);
    await redraw();
  });

  document.getElementById('chart').oncontextmenu = async (e) => {
    e.preventDefault();
    const chart = document.getElementById('chart');
    const fullLayout = chart._fullLayout;
    const xAxis = fullLayout?.xaxis;
    const yAxis = fullLayout?.yaxis;
    if (!xAxis || !yAxis) return;
    const rect = chart.getBoundingClientRect();
    const plotX = e.clientX - rect.left - xAxis._offset;
    const plotY = e.clientY - rect.top - yAxis._offset;
    const isInsidePlot = (
      plotX >= 0 && plotX <= xAxis._length
      && plotY >= 0 && plotY <= yAxis._length
    );
    if (!isInsidePlot) return;
    const x = xAxis.p2d(plotX);
    const y = yAxis.p2d(plotY);
    togglePoint(x, y);
    await redraw();
  };
}

(async function init() {
  syncFocusButtonText();
  syncAnnotationButtonText();
  syncAnnotationVisibilityText();
  syncViewControlText();
  setStatus('初始化中，請稍候...');
  refreshSaveList();
  await loadOptions();
  await redraw();
  bindEvents();
  setStatus('初始化完成。');
})();
</script>
</body>
</html>
