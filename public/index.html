<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DistanceViewer Web</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { font-family: Arial, 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif; margin: 16px; background: #f5f7fb; color: #1f2937; }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(320px, 1.15fr) minmax(360px, 1.35fr) minmax(300px, 0.95fr);
      gap: 10px;
      margin-bottom: 10px;
      align-items: stretch;
    }
    .toolbar.hidden { display: none; }
    .control-group {
      background: #ffffff;
      border: 1px solid #d8e0ea;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 1px 3px rgba(16, 24, 40, 0.06);
      min-width: 0;
      width: 100%;
    }
    .control-title {
      margin: 0 0 10px;
      font-size: 15px;
      color: #0f4c81;
    }
    .control-grid {
      display: grid;
      gap: 6px;
    }
    .field-grid {
      display: grid;
      grid-template-columns: minmax(72px, auto) minmax(0, 1fr);
      gap: 6px 8px;
      align-items: center;
    }
    .field-grid label {
      display: contents;
    }
    .field-label {
      font-size: 14px;
      color: #0f172a;
      white-space: nowrap;
    }
    .inline-fields {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    label {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 14px;
    }
    select,
    input[type="text"],
    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      max-width: 100%;
    }
    .field-grid select {
      max-width: 300px;
    }
    .field-grid input[type="text"] {
      max-width: 360px;
    }
    input[type="color"] {
      width: 64px;
      min-width: 64px;
      height: 34px;
      padding: 2px;
    }
    .range-input {
      width: 84px !important;
    }
    .font-size-input {
      width: 110px !important;
    }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(170px, 1fr));
      gap: 6px 12px;
    }
    .color-item {
      display: grid;
      grid-template-columns: auto 72px;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .color-item .field-label {
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .button-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, max-content));
      gap: 6px;
      justify-content: start;
    }
    button {
      border: 1px solid #c5d3e3;
      background: #f8fbff;
      color: #0b3a66;
      border-radius: 6px;
      padding: 6px 8px;
      width: auto;
      min-width: 140px;
      cursor: pointer;
    }
    button:hover {
      background: #edf5ff;
    }
    .view-controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
    #mapPane { width: min(92vw, 78vh); margin: 0 auto; }
    #mapPane:fullscreen {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      padding: 16px;
      box-sizing: border-box;
    }
    #mapPane:fullscreen #chart {
      width: min(calc(100vw - 32px), calc(100vh - 32px));
      height: min(calc(100vw - 32px), calc(100vh - 32px));
    }
    #chart { width: min(92vw, 78vh); height: min(92vw, 78vh); margin: 0 auto; }
    .hint { color: #555; font-size: 14px; }
    .status { margin: 8px 0 12px; color: #0f5132; background: #d1e7dd; border: 1px solid #badbcc; border-radius: 4px; padding: 8px 10px; min-height: 18px; }
    .status.error { color: #842029; background: #f8d7da; border-color: #f5c2c7; }
    #saveName { max-width: 320px; }
    #saveList { min-width: 0; width: 100%; max-width: 360px; }
    @media (max-width: 1320px) {
      .toolbar {
        grid-template-columns: repeat(2, minmax(320px, 1fr));
      }
    }
    @media (max-width: 940px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 760px) {
      .color-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h2>DistanceViewer（Web 版）</h2>
  <div class="toolbar">
    <section class="control-group group-filter">
      <h3 class="control-title">篩選與新增</h3>
      <div class="control-grid">
        <div class="field-grid">
          <label><span class="field-label">資源</span>
            <select id="resource"></select>
          </label>
          <label><span class="field-label">神蹟</span>
            <select id="wonder"></select>
          </label>
          <label><span class="field-label">X 範圍</span>
            <span class="inline-fields">
            <input id="xMin" class="range-input" type="number" min="0" max="100" value="0" />
            ~
            <input id="xMax" class="range-input" type="number" min="0" max="100" value="100" />
            </span>
          </label>
          <label><span class="field-label">Y 範圍</span>
            <span class="inline-fields">
            <input id="yMin" class="range-input" type="number" min="0" max="100" value="0" />
            ~
            <input id="yMax" class="range-input" type="number" min="0" max="100" value="100" />
            </span>
          </label>
        </div>
        <div class="button-row">
          <button id="addFiltered">新增符合條件點</button>
          <input id="singlePointX" class="range-input" type="number" min="0" max="100" placeholder="X" />
          <input id="singlePointY" class="range-input" type="number" min="0" max="100" placeholder="Y" />
          <button id="addSinglePoint">新增單點</button>
          <button id="clear">清空所有點</button>
          <button id="undo">還原上一步</button>
          <button id="redo">取消還原上一步</button>
        </div>
      </div>
    </section>

    <section class="control-group group-visual">
      <h3 class="control-title">視覺與標記</h3>
      <div class="control-grid">
        <div class="color-grid">
          <label class="color-item"><span class="field-label">新增點顏色</span>
            <input id="newPointColor" type="color" value="#1f77b4" />
          </label>
          <label class="color-item"><span class="field-label">關注目標色</span>
            <input id="focusColor" type="color" value="#d62728" />
          </label>
          <label><span class="field-label">關注點樣式</span>
            <select id="focusMarkerOption">
              <option value="circle">圓點（預設）</option>
              <option value="diamond">菱形</option>
              <option value="star">星形</option>
              <option value="cross">十字</option>
              <option value="emoji:🔥">🔥 火焰</option>
              <option value="emoji:⭐">⭐ 星星</option>
              <option value="emoji:🎯">🎯 目標</option>
              <option value="emoji:👀">👀 關注</option>
              <option value="emoji:💎">💎 寶石</option>
              <option value="emoji:🚩">🚩 旗幟</option>
              <option value="emoji:🏠">🏠 城鎮</option>
              <option value="emoji:🏰">🏰 城堡</option>
              <option value="emoji:🗼">🗼 塔樓</option>
              <option value="emoji:⛺">⛺ 營地</option>
              <option value="emoji:⚔️">⚔️ 戰場</option>
              <option value="emoji:🛡️">🛡️ 防守</option>
              <option value="emoji:⛏️">⛏️ 礦區</option>
              <option value="emoji:🌲">🌲 森林</option>
              <option value="emoji:🌊">🌊 水域</option>
              <option value="emoji:⛰️">⛰️ 山區</option>
              <option value="emoji:🧭">🧭 路線</option>
              <option value="emoji:📍">📍 地標</option>
              <option value="emoji:🚧">🚧 危險區</option>
              <option value="emoji:🅿️">🅿️ 集結點</option>
              <option value="emoji:💰">💰 資源點</option>
            </select>
          </label>
          <label class="color-item"><span class="field-label">註解文字色</span>
            <input id="annotationTextColor" type="color" value="#7c3aed" />
          </label>
          <label class="color-item"><span class="field-label">註解底色</span>
            <input id="annotationBgColor" type="color" value="#fff4d6" />
          </label>
        </div>
        <div class="field-grid">
          <label><span class="field-label">註解字型</span>
            <input id="annotationFontFamily" type="text" value="Arial, sans-serif" />
          </label>
          <label><span class="field-label">註解字級</span>
            <input id="annotationFontSize" class="font-size-input" type="number" min="10" max="48" value="16" />
          </label>
        </div>
        <div class="button-row">
          <button id="setFocusPoint">點選點設為關注目標</button>
          <button id="setAnnotationPoint">點選點編輯註解</button>
          <button id="setTextBox">文字方塊模式：關</button>
          <button id="toggleEdges">切換邊線</button>
          <button id="toggleLabels">切換標籤</button>
          <button id="toggleDistanceLabels">距離顯示：關</button>
          <button id="toggleAnnotations">切換註解顯示</button>
        </div>
      </div>
    </section>

    <section class="control-group group-version">
      <h3 class="control-title">版本管理</h3>
      <div class="control-grid">
        <input id="saveName" type="text" placeholder="存檔名稱（例：主城圈）" />
        <div class="button-row">
          <button id="saveAs">另存新版本</button>
          <button id="save">覆寫目前版本</button>
        </div>
        <select id="saveList"></select>
        <div class="button-row">
          <button id="load">載入選取版本</button>
          <button id="renameSave">重新命名</button>
          <button id="deleteSave">刪除版本</button>
        </div>
        <div class="button-row">
          <button id="exportSave">匯出到本機</button>
          <button id="importSave">匯入檔案到瀏覽器</button>
          <input id="importFile" type="file" accept="application/json" style="display:none" />
        </div>
      </div>
    </section>
  </div>
  <div class="view-controls">
    <button id="toggleToolbar">隱藏工具列</button>
    <button id="toggleFullscreen">地圖全螢幕</button>
  </div>
  <p class="hint">左鍵點圖可新增點（關注/註解/文字方塊模式下可套用設定），右鍵可刪除點；文字方塊模式下可左鍵點既有方塊編輯、右鍵刪除、拖曳移動。座標範圍：0~100。</p>
  <div id="status" class="status">準備就緒。</div>
  <div id="mapPane">
    <div id="chart"></div>
  </div>

<script>
let selectedPoints = [];
const pointHistory = [];
const redoHistory = [];
const HISTORY_LIMIT = 50;
let showEdges = true;
let showLabels = true;
let showDistanceLabels = false;
let focusMode = false;
let annotationMode = false;
let textBoxMode = false;
let showAnnotations = true;
let toolbarVisible = true;
let chartInitialized = false;
const STORAGE_KEY = 'distanceViewerSavesV2';
let activeSaveId = '';
let currentViewRange = null;
const EXPORT_IMAGE_SCALE = 3;
let customTextBoxes = [];
let selectedTextBoxIndex = -1;
let textBoxDragState = null;
let suppressNextTextBoxClick = false;

function endpoint(path) { return path; }
function getNewPointColor() { return document.getElementById('newPointColor').value; }
function getFocusColor() { return document.getElementById('focusColor').value; }
function getFocusMarkerOption() {
  return document.getElementById('focusMarkerOption').value || 'circle';
}
function getFocusSetting() {
  const markerOption = getFocusMarkerOption();
  if (markerOption.startsWith('emoji:')) {
    return { marker: 'emoji', emoji: markerOption.slice('emoji:'.length) || '🔥' };
  }
  return { marker: markerOption, emoji: '' };
}
function getEmojiFontFamily() {
  return [
    "'Apple Color Emoji'",
    "'Segoe UI Emoji'",
    "'Noto Color Emoji'",
    "'Twemoji Mozilla'",
    "'EmojiOne Color'",
    "sans-serif",
  ].join(', ');
}
function getAnnotationTextColor() { return document.getElementById('annotationTextColor').value; }
function getAnnotationBgColor() { return document.getElementById('annotationBgColor').value; }
function getAnnotationFontFamily() {
  return (document.getElementById('annotationFontFamily').value || '').trim() || 'Arial, sans-serif';
}
function getAnnotationFontSize() {
  const value = Number(document.getElementById('annotationFontSize').value);
  if (!Number.isFinite(value)) return 16;
  return Math.min(48, Math.max(10, Math.round(value)));
}
function toCoordNumber(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : NaN;
}
function getPlotlyConfig() {
  return {
    responsive: true,
    toImageButtonOptions: {
      format: 'png',
      scale: EXPORT_IMAGE_SCALE,
      filename: 'distance-viewer',
    },
  };
}
function buildAutoScaleRange(points, fallbackRange = null) {
  if (!Array.isArray(points) || points.length === 0) return fallbackRange;
  const xs = points.map((point) => Number(point.x)).filter(Number.isFinite);
  const ys = points.map((point) => Number(point.y)).filter(Number.isFinite);
  if (!xs.length || !ys.length) return fallbackRange;
  const minX = Math.min(...xs);
  const maxX = Math.max(...xs);
  const minY = Math.min(...ys);
  const maxY = Math.max(...ys);
  const spanX = maxX - minX;
  const spanY = maxY - minY;
  const padding = Math.max(3, Math.ceil(Math.max(spanX, spanY) * 0.15));
  const nextRange = {
    xMin: Math.max(0, Math.round(minX - padding)),
    xMax: Math.min(100, Math.round(maxX + padding)),
    yMin: Math.max(0, Math.round(minY - padding)),
    yMax: Math.min(100, Math.round(maxY + padding)),
  };
  if (nextRange.xMin >= nextRange.xMax || nextRange.yMin >= nextRange.yMax) return fallbackRange;
  return nextRange;
}
function captureViewRangeFromChart() {
  if (!chartInitialized) return null;
  const chart = document.getElementById('chart');
  const xRange = chart?._fullLayout?.xaxis?.range;
  const yRange = chart?._fullLayout?.yaxis?.range;
  if (!Array.isArray(xRange) || xRange.length !== 2 || !Array.isArray(yRange) || yRange.length !== 2) {
    return null;
  }
  const x0 = Number(xRange[0]);
  const x1 = Number(xRange[1]);
  const y0 = Number(yRange[0]);
  const y1 = Number(yRange[1]);
  if (![x0, x1, y0, y1].every(Number.isFinite)) return null;
  const nextRange = {
    xMin: Math.min(x0, x1),
    xMax: Math.max(x0, x1),
    yMin: Math.min(y0, y1),
    yMax: Math.max(y0, y1),
  };
  if (!(nextRange.xMin < nextRange.xMax && nextRange.yMin < nextRange.yMax)) return null;
  return nextRange;
}
function getConfiguredRange() {
  const xMin = Math.round(toCoordNumber(document.getElementById('xMin').value));
  const xMax = Math.round(toCoordNumber(document.getElementById('xMax').value));
  const yMin = Math.round(toCoordNumber(document.getElementById('yMin').value));
  const yMax = Math.round(toCoordNumber(document.getElementById('yMax').value));
  const isValid = [xMin, xMax, yMin, yMax].every(Number.isFinite)
    && 0 <= xMin && xMin <= xMax && xMax <= 100
    && 0 <= yMin && yMin <= yMax && yMax <= 100;
  if (!isValid) {
    return { xMin: 0, xMax: 100, yMin: 0, yMax: 100, isValid: false };
  }
  return { xMin, xMax, yMin, yMax, isValid: true };
}
function setStatus(message, isError = false) {
  const box = document.getElementById('status');
  box.textContent = message;
  box.classList.toggle('error', isError);
}
function formatTimeLabel(isoText) {
  if (!isoText) return '未知時間';
  const date = new Date(isoText);
  if (Number.isNaN(date.getTime())) return '未知時間';
  return date.toLocaleString('zh-Hant-TW', { hour12: false });
}
function formatDistanceValue(distance) {
  const numericDistance = Number(distance);
  if (!Number.isFinite(numericDistance)) return '距離: --';
  return `距離: ${numericDistance.toFixed(2)}`;
}
function formatCompactDistanceValue(distance) {
  const numericDistance = Number(distance);
  if (!Number.isFinite(numericDistance)) return '--';
  return numericDistance.toFixed(1);
}
function clonePoints(points) {
  return (points || []).map((p) => ({
    x: Number(p.x),
    y: Number(p.y),
    resource: p.resource || '',
    wonder: p.wonder || '',
    color: p.color || getNewPointColor(),
    note: p.note || '',
    focusMarker: p.focusMarker || '',
    focusEmoji: p.focusEmoji || '',
  })).filter((p) => Number.isFinite(p.x) && Number.isFinite(p.y));
}
function cloneTextBoxes(boxes) {
  return (boxes || []).map((box) => ({
    x: Number(box.x),
    y: Number(box.y),
    text: (box.text || '').trim(),
    textColor: box.textColor || getAnnotationTextColor(),
    bgColor: box.bgColor || getAnnotationBgColor(),
    fontSize: Number.isFinite(Number(box.fontSize)) ? Number(box.fontSize) : getAnnotationFontSize(),
  })).filter((box) => Number.isFinite(box.x) && Number.isFinite(box.y) && box.text);
}
function createStateSnapshot() {
  return {
    points: clonePoints(selectedPoints),
    textBoxes: cloneTextBoxes(customTextBoxes),
  };
}
function applyStateSnapshot(snapshot) {
  selectedPoints = clonePoints(snapshot?.points);
  customTextBoxes = cloneTextBoxes(snapshot?.textBoxes);
}
function undoLastPointChange() {
  if (!pointHistory.length) return false;
  redoHistory.push(createStateSnapshot());
  if (redoHistory.length > HISTORY_LIMIT) redoHistory.shift();
  applyStateSnapshot(pointHistory.pop());
  return true;
}
function redoLastPointChange() {
  if (!redoHistory.length) return false;
  pointHistory.push(createStateSnapshot());
  if (pointHistory.length > HISTORY_LIMIT) pointHistory.shift();
  applyStateSnapshot(redoHistory.pop());
  return true;
}
function pointsEqual(a, b) {
  if (a.length !== b.length) return false;
  return a.every((p, idx) => {
    const q = b[idx];
    return p.x === q.x
      && p.y === q.y
      && p.resource === q.resource
      && p.wonder === q.wonder
      && p.color === q.color
      && p.note === q.note
      && p.focusMarker === q.focusMarker
      && p.focusEmoji === q.focusEmoji;
  });
}
function textBoxesEqual(a, b) {
  if (a.length !== b.length) return false;
  return a.every((box, idx) => {
    const target = b[idx];
    return box.x === target.x
      && box.y === target.y
      && box.text === target.text
      && box.textColor === target.textColor
      && box.bgColor === target.bgColor
      && Number(box.fontSize) === Number(target.fontSize);
  });
}
function applyPointMutation(mutator) {
  const before = createStateSnapshot();
  mutator();
  const after = createStateSnapshot();
  const changed = !pointsEqual(before.points, after.points)
    || !textBoxesEqual(before.textBoxes, after.textBoxes);
  if (changed) {
    pointHistory.push(before);
    if (pointHistory.length > HISTORY_LIMIT) pointHistory.shift();
    redoHistory.length = 0;
    applyStateSnapshot(after);
    return true;
  }
  applyStateSnapshot(after);
  return false;
}
function readSaveStore() {
  const fallback = { saves: [] };
  try {
    const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (!parsed || typeof parsed !== 'object' || !Array.isArray(parsed.saves)) return fallback;
    return { saves: parsed.saves };
  } catch {
    return fallback;
  }
}
function writeSaveStore(store) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ saves: store.saves || [] }));
}
function getSelectedSaveId() {
  return document.getElementById('saveList').value || '';
}
function getSaveNameInput() {
  return (document.getElementById('saveName').value || '').trim();
}
function refreshSaveList(preferredId = activeSaveId) {
  const select = document.getElementById('saveList');
  const store = readSaveStore();
  const saves = [...store.saves].sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
  if (!saves.length) {
    select.innerHTML = '<option value="">（尚無存檔）</option>';
    select.value = '';
    activeSaveId = '';
    return;
  }
  select.innerHTML = saves.map((save) => (
    `<option value="${save.id}">${save.name || '未命名'}｜${formatTimeLabel(save.updatedAt)}</option>`
  )).join('');
  const exists = saves.some((save) => save.id === preferredId);
  select.value = exists ? preferredId : saves[0].id;
  activeSaveId = select.value;
}
function saveCurrentAsNewVersion(name) {
  const trimmedName = (name || '').trim();
  if (!trimmedName) throw new Error('請先輸入存檔名稱。');
  const now = new Date().toISOString();
  const store = readSaveStore();
  const item = {
    id: `save_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
    name: trimmedName,
    createdAt: now,
    updatedAt: now,
    points: clonePoints(selectedPoints),
    textBoxes: cloneTextBoxes(customTextBoxes),
  };
  store.saves.push(item);
  writeSaveStore(store);
  activeSaveId = item.id;
  refreshSaveList(item.id);
}
function overwriteSelectedVersion() {
  const saveId = getSelectedSaveId();
  if (!saveId) throw new Error('請先選擇要覆寫的版本。');
  const store = readSaveStore();
  const target = store.saves.find((save) => save.id === saveId);
  if (!target) throw new Error('找不到指定版本。');
  target.points = clonePoints(selectedPoints);
  target.textBoxes = cloneTextBoxes(customTextBoxes);
  target.updatedAt = new Date().toISOString();
  const renamed = getSaveNameInput();
  if (renamed) target.name = renamed;
  writeSaveStore(store);
  refreshSaveList(saveId);
}
function loadSelectedVersion() {
  const saveId = getSelectedSaveId();
  if (!saveId) throw new Error('目前沒有可載入的版本。');
  const store = readSaveStore();
  const target = store.saves.find((save) => save.id === saveId);
  if (!target) throw new Error('找不到指定版本。');
  selectedPoints = clonePoints(target.points);
  customTextBoxes = cloneTextBoxes(target.textBoxes);
  activeSaveId = saveId;
  document.getElementById('saveName').value = target.name || '';
}
function renameSelectedVersion(newName) {
  const saveId = getSelectedSaveId();
  const trimmedName = (newName || '').trim();
  if (!saveId) throw new Error('請先選擇版本。');
  if (!trimmedName) throw new Error('請輸入新名稱。');
  const store = readSaveStore();
  const target = store.saves.find((save) => save.id === saveId);
  if (!target) throw new Error('找不到指定版本。');
  target.name = trimmedName;
  target.updatedAt = new Date().toISOString();
  writeSaveStore(store);
  refreshSaveList(saveId);
}
function deleteSelectedVersion() {
  const saveId = getSelectedSaveId();
  if (!saveId) throw new Error('請先選擇要刪除的版本。');
  const store = readSaveStore();
  const nextSaves = store.saves.filter((save) => save.id !== saveId);
  if (nextSaves.length === store.saves.length) throw new Error('找不到指定版本。');
  writeSaveStore({ saves: nextSaves });
  refreshSaveList(nextSaves[0]?.id || '');
}
function buildExportPayload() {
  const saveId = getSelectedSaveId();
  const store = readSaveStore();
  const target = store.saves.find((save) => save.id === saveId);
  if (!target) throw new Error('請先選擇要匯出的版本。');
  return {
    format: 'distanceViewer.save.v2',
    exportedAt: new Date().toISOString(),
    save: {
      ...target,
      points: clonePoints(target.points),
      textBoxes: cloneTextBoxes(target.textBoxes),
    },
  };
}
function importSavePayload(payload) {
  if (!payload || typeof payload !== 'object') throw new Error('檔案內容格式錯誤。');
  const save = payload.save;
  if (!save || typeof save !== 'object') throw new Error('檔案缺少 save 區塊。');
  const store = readSaveStore();
  const imported = {
    id: `save_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
    name: `${save.name || '匯入版本'}（匯入）`,
    createdAt: save.createdAt || new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    points: clonePoints(save.points),
    textBoxes: cloneTextBoxes(save.textBoxes),
  };
  store.saves.push(imported);
  writeSaveStore(store);
  activeSaveId = imported.id;
  refreshSaveList(imported.id);
  document.getElementById('saveName').value = imported.name;
}

function optionHTML(items) {
  return ['<option value="">(不限)</option>', ...items.map(i => `<option value="${i}">${i}</option>`)].join('');
}

function pickDistanceLabelEdges(edges) {
  const usedVertices = new Set();
  return edges.filter((edge) => {
    const v1 = `${edge.x1},${edge.y1}`;
    const v2 = `${edge.x2},${edge.y2}`;
    if (usedVertices.has(v1) || usedVertices.has(v2)) return false;
    usedVertices.add(v1);
    usedVertices.add(v2);
    return true;
  });
}

function buildAnnotationOffset(point) {
  // 避免文字註解遮住關注圖示：統一往右上偏移，emoji 額外加大位移。
  const hasFocusMarker = Boolean(point.focusMarker);
  const isEmojiMarker = point.focusMarker === 'emoji';
  const xshift = isEmojiMarker ? 26 : (hasFocusMarker ? 20 : 14);
  const yshift = isEmojiMarker ? -26 : (hasFocusMarker ? -20 : -14);
  return { xshift, yshift };
}

async function addFilteredPoints() {
  const resource = document.getElementById('resource').value;
  const wonder = document.getElementById('wonder').value;
  const { xMin, xMax, yMin, yMax, isValid } = getConfiguredRange();

  if (!isValid) {
    setStatus('X / Y 範圍需在 0~100，且最小值不可大於最大值。', true);
    return;
  }

  const qs = new URLSearchParams({
    resource, wonder,
    x_min: String(xMin), x_max: String(xMax),
    y_min: String(yMin), y_max: String(yMax),
  });
  await withStatus('正在新增符合條件點...', async () => {
    const r = await fetch(endpoint(`/api/points/query?${qs.toString()}`));
    if (!r.ok) {
      const errData = await r.json().catch(() => ({}));
      throw new Error(errData.error || `HTTP ${r.status}`);
    }
    const data = await r.json();
    applyPointMutation(() => {
      const existing = new Set(selectedPoints.map((p) => `${p.x},${p.y}`));
      data.forEach((p) => {
        const key = `${p.x},${p.y}`;
        if (!existing.has(key)) {
          selectedPoints.push({ ...p, color: getNewPointColor(), note: '', focusMarker: '', focusEmoji: '' });
          existing.add(key);
        }
      });
    });
    await redraw();
  }, '已新增符合條件點。');
}

async function addSinglePointFromInput() {
  const x = Math.round(toCoordNumber(document.getElementById('singlePointX').value));

    setStatus('請輸入有效的整數座標。', true);
    return;
  }
  if (x < 0 || x > 100 || y < 0 || y > 100) {
    setStatus('單點座標需在 0~100 之間。', true);
    return;
  }

  const qs = new URLSearchParams({
    x_min: String(x),
    x_max: String(x),
    y_min: String(y),
    y_max: String(y),
  });
  await withStatus('正在新增指定單點...', async () => {
    const r = await fetch(endpoint(`/api/points/query?${qs.toString()}`));
    if (!r.ok) {
      const errData = await r.json().catch(() => ({}));
      throw new Error(errData.error || `HTTP ${r.status}`);
    }
    const data = await r.json();
    applyPointMutation(() => {
      const existingIndex = selectedPoints.findIndex((p) => p.x === x && p.y === y);

async function redraw() {
  setStatus('正在重繪圖表...');
  const liveRange = captureViewRangeFromChart();
  if (liveRange) {
    currentViewRange = liveRange;
  }
  const { xMin, xMax, yMin, yMax } = getConfiguredRange();
  if (!currentViewRange) {
    currentViewRange = { xMin, xMax, yMin, yMax };
  }
  const tracePoints = {
    x: selectedPoints.map(p => p.x),
    y: selectedPoints.map(p => p.y),
    mode: showLabels ? 'markers+text' : 'markers',
    type: 'scatter',
    marker: {
      size: 10,
      color: selectedPoints.map((p) => (
        p.focusMarker === 'emoji' ? 'rgba(0,0,0,0)' : (p.color || 'blue')
      )),
      symbol: selectedPoints.map((p) => {
        if (p.focusMarker === 'diamond') return 'diamond';
        if (p.focusMarker === 'star') return 'star';
        if (p.focusMarker === 'cross') return 'cross';
        return 'circle';
      }),
    },
    text: selectedPoints.map(p => `(${p.x}, ${p.y})<br>${p.resource || ''}<br>${p.wonder || ''}`),
    textposition: 'top right',
    hovertemplate: '%{text}<extra></extra>'
  };

  const traces = [tracePoints];

  if (showAnnotations) {
    const notedPoints = selectedPoints.filter((p) => (p.note || '').trim());
    if (notedPoints.length) {
      // 註解改成 layout.annotations 以提供更顯眼樣式（底色、邊框、字型）
    }
  }
  if (showEdges && selectedPoints.length >= 3) {
    const edges = await triangulate(selectedPoints);
    edges.forEach(e => {
      traces.push({
        x: [e.x1, e.x2], y: [e.y1, e.y2], mode: 'lines', type: 'scatter',
        line: { color: '#333', width: 1 }, hovertemplate: `${formatDistanceValue(e.distance)}<extra></extra>`
      });
    });
    if (showDistanceLabels) {
      const labelEdges = pickDistanceLabelEdges(edges);
      if (labelEdges.length) {
        traces.push({
          x: labelEdges.map((e) => (e.x1 + e.x2) / 2),
          y: labelEdges.map((e) => (e.y1 + e.y2) / 2),
          mode: 'text',
          type: 'scatter',
          text: labelEdges.map((e) => `<i>${formatCompactDistanceValue(e.distance)}</i>`),
          textposition: 'middle center',
          textfont: { size: 11, color: '#64748b' },
          hoverinfo: 'skip',
        });
      }
    }
  }

  const emojiFocusPoints = selectedPoints.filter((p) => p.focusMarker === 'emoji');
  if (emojiFocusPoints.length) {
    traces.push({
      x: emojiFocusPoints.map((p) => p.x),
      y: emojiFocusPoints.map((p) => p.y),
      mode: 'text',
      type: 'scatter',
      text: emojiFocusPoints.map((p) => p.focusEmoji || '🔥'),
      textposition: 'middle center',
      textfont: {
        size: 20,
        family: getEmojiFontFamily(),
      },
      hovertemplate: emojiFocusPoints.map((p) => `(${p.x}, ${p.y})<extra></extra>`),
      hoverlabel: { font: { family: getEmojiFontFamily() } },
      cliponaxis: false,
    });
  }

  const layout = {
    xaxis: { range: [currentViewRange.xMin, currentViewRange.xMax], dtick: 5 },
    yaxis: { range: [currentViewRange.yMax, currentViewRange.yMin], dtick: 5, scaleanchor: 'x', scaleratio: 1 },
    margin: { l: 40, r: 20, b: 40, t: 20 },
    showlegend: false,
    annotations: showAnnotations
      ? [
          ...selectedPoints
            .filter((p) => (p.note || '').trim())
            .map((p) => {
              const { xshift, yshift } = buildAnnotationOffset(p);
              return {
                x: p.x,
                y: p.y,
                text: p.note,
                xanchor: 'left',
                yanchor: 'bottom',
                xshift,
                yshift,
                showarrow: false,
                bordercolor: '#7c3aed',
                borderwidth: 1.5,
                borderpad: 4,
                bgcolor: getAnnotationBgColor(),
                opacity: 0.98,
                font: {
                  size: getAnnotationFontSize(),
                  color: getAnnotationTextColor(),
                  family: getAnnotationFontFamily(),
                },
              };
            }),
          ...customTextBoxes.map((box, idx) => ({
            x: box.x,
            y: box.y,
            text: box.text,
            xanchor: 'left',
            yanchor: 'bottom',
            xshift: 12,
            yshift: -12,
            showarrow: false,
            bordercolor: '#1d4ed8',
            borderwidth: idx === selectedTextBoxIndex ? 3 : 1.5,
            borderpad: 4,
            bgcolor: box.bgColor || '#eff6ff',
            opacity: 0.98,
            font: {
              size: Number(box.fontSize) || getAnnotationFontSize(),
              color: box.textColor || '#1e3a8a',
              family: getAnnotationFontFamily(),
            },
          })),
        ]
      : [],
  };

  if (chartInitialized) {
    await Plotly.react('chart', traces, layout, getPlotlyConfig());
  } else {
    await Plotly.newPlot('chart', traces, layout, getPlotlyConfig());
    chartInitialized = true;
    document.getElementById('chart').on('plotly_relayout', (evt) => {
      const next = { ...currentViewRange };
      if (Array.isArray(evt['xaxis.range']) && evt['xaxis.range'].length === 2) {
        next.xMin = Number(evt['xaxis.range'][0]);
        next.xMax = Number(evt['xaxis.range'][1]);
      } else {
        if (Number.isFinite(evt['xaxis.range[0]'])) next.xMin = Number(evt['xaxis.range[0]']);
        if (Number.isFinite(evt['xaxis.range[1]'])) next.xMax = Number(evt['xaxis.range[1]']);
      }
      if (Array.isArray(evt['yaxis.range']) && evt['yaxis.range'].length === 2) {
        const y0 = Number(evt['yaxis.range'][0]);
        const y1 = Number(evt['yaxis.range'][1]);
        next.yMax = Math.max(y0, y1);
        next.yMin = Math.min(y0, y1);
      } else {
        const y0 = Number(evt['yaxis.range[0]']);
        const y1 = Number(evt['yaxis.range[1]']);
        if (Number.isFinite(y0) && Number.isFinite(y1)) {
          next.yMax = Math.max(y0, y1);
          next.yMin = Math.min(y0, y1);
        }
      }
      if (
        [next.xMin, next.xMax, next.yMin, next.yMax].every(Number.isFinite)
        && next.xMin < next.xMax
        && next.yMin < next.yMax
      ) {
        currentViewRange = next;
      }
    });
  }
  setStatus('圖表更新完成。');
}

function findPointIndex(x, y) {

  return selectedPoints.findIndex((p) => (
    Math.round(toCoordNumber(p.x)) === x && Math.round(toCoordNumber(p.y)) === y
  ));
}

function addPoint(x, y) {
  x = Math.round(toCoordNumber(x)); y = Math.round(toCoordNumber(y));
  if (!Number.isFinite(x) || !Number.isFinite(y)) return;
  if (x < 0 || x > 100 || y < 0 || y > 100) return;
  const idx = findPointIndex(x, y);
  if (idx >= 0) return;
  selectedPoints.push({
    x, y, resource: '', wonder: '', color: getNewPointColor(), note: '', focusMarker: '', focusEmoji: ''
  });
}

function removePoint(x, y) {
  x = Math.round(toCoordNumber(x)); y = Math.round(toCoordNumber(y));
  if (!Number.isFinite(x) || !Number.isFinite(y)) return;
  if (x < 0 || x > 100 || y < 0 || y > 100) return;
  const idx = findPointIndex(x, y);
  if (idx >= 0) {
    selectedPoints.splice(idx, 1);
  }
}

function updatePointOnMode(x, y, shouldApplyFocusColor = false, shouldEditAnnotation = false) {
  x = Math.round(toCoordNumber(x)); y = Math.round(toCoordNumber(y));
  if (!Number.isFinite(x) || !Number.isFinite(y)) return;
  if (x < 0 || x > 100 || y < 0 || y > 100) return;
  const idx = findPointIndex(x, y);
  if (idx >= 0) {
    if (shouldEditAnnotation) {
      editPointAnnotation(selectedPoints[idx]);
    } else if (shouldApplyFocusColor) {
      const focusSetting = getFocusSetting();
      selectedPoints[idx].focusMarker = focusSetting.marker;
      selectedPoints[idx].focusEmoji = focusSetting.emoji;
      if (focusSetting.marker !== 'emoji') {
        selectedPoints[idx].color = getFocusColor();
      }
    }
  }
}

function clientToDataPoint(clientX, clientY) {
  const chart = document.getElementById('chart');
  const fullLayout = chart?._fullLayout;
  const xAxis = fullLayout?.xaxis;
  const yAxis = fullLayout?.yaxis;
  if (!xAxis || !yAxis) return null;
  const rect = chart.getBoundingClientRect();
  const plotX = clientX - rect.left - xAxis._offset;
  const plotY = clientY - rect.top - yAxis._offset;
  const isInsidePlot = (
    plotX >= 0 && plotX <= xAxis._length
    && plotY >= 0 && plotY <= yAxis._length
  );
  if (!isInsidePlot) return null;
  return {
    x: xAxis.p2d(plotX),
    y: yAxis.p2d(plotY),
    xAxis,
    yAxis,
    rect,
  };
}

function findNearestTextBoxIndex(clientX, clientY) {
  if (!customTextBoxes.length) return -1;
  const point = clientToDataPoint(clientX, clientY);
  if (!point) return -1;
  const { xAxis, yAxis, rect } = point;
  let minScore = Infinity;
  let minIndex = -1;
  customTextBoxes.forEach((box, idx) => {
    const anchorPx = rect.left + xAxis._offset + xAxis.d2p(box.x);
    const anchorPy = rect.top + yAxis._offset + yAxis.d2p(box.y);
    const centerX = anchorPx + 12;
    const centerY = anchorPy - 12;
    const fontSize = Number(box.fontSize) || getAnnotationFontSize();
    const textLength = (box.text || '').length;
    const halfWidth = Math.min(220, Math.max(48, textLength * fontSize * 0.3));
    const halfHeight = Math.max(20, fontSize * 0.9);
    const dx = Math.abs(clientX - centerX);
    const dy = Math.abs(clientY - centerY);
    const inRect = dx <= halfWidth && dy <= halfHeight;
    const edgeDx = Math.max(0, dx - halfWidth);
    const edgeDy = Math.max(0, dy - halfHeight);
    const score = inRect ? Math.hypot(dx, dy) * 0.5 : Math.hypot(edgeDx, edgeDy);
    if (score < minScore) {
      minScore = score;
      minIndex = idx;
    }
  });
  return minScore <= 22 ? minIndex : -1;
}

  document.getElementById('setTextBox').onclick = () => {
    textBoxMode = !textBoxMode;
    if (textBoxMode) {
      focusMode = false;
      annotationMode = false;
    }
    syncTextBoxButtonText();
    syncFocusButtonText();
    syncAnnotationButtonText();
    setStatus(textBoxMode ? '已開啟文字方塊模式：左鍵新增或編輯、右鍵刪除、拖曳可移動文字方塊。' : '已關閉文字方塊模式。');
  };
  document.getElementById('toggleEdges').onclick = async () => { showEdges = !showEdges; await redraw(); };
  document.getElementById('toggleLabels').onclick = async () => { showLabels = !showLabels; await redraw(); };
  document.getElementById('toggleDistanceLabels').onclick = async () => {
    showDistanceLabels = !showDistanceLabels;
    syncDistanceVisibilityText();
    await redraw();
  };
  document.getElementById('toggleAnnotations').onclick = async () => {
    showAnnotations = !showAnnotations;
    syncAnnotationVisibilityText();
    await redraw();
  };
  document.getElementById('saveAs').onclick = () => withStatus('正在建立新版本...', async () => {
    saveCurrentAsNewVersion(getSaveNameInput());
  }, '已建立新版本。');
  document.getElementById('save').onclick = () => withStatus('正在覆寫版本...', async () => {
    overwriteSelectedVersion();
  }, '已覆寫選取版本。');
  document.getElementById('load').onclick = async () => withStatus('正在載入版本...', async () => {
    applyPointMutation(() => {
      loadSelectedVersion();
    });
    await redraw();
  }, '版本載入完成。');
  document.getElementById('renameSave').onclick = () => withStatus('正在重新命名版本...', async () => {
    renameSelectedVersion(getSaveNameInput());
  }, '版本名稱已更新。');
  document.getElementById('deleteSave').onclick = () => withStatus('正在刪除版本...', async () => {
    deleteSelectedVersion();
  }, '版本已刪除。');
  document.getElementById('saveList').addEventListener('change', () => {
    activeSaveId = getSelectedSaveId();
    const store = readSaveStore();
    const target = store.saves.find((save) => save.id === activeSaveId);
    document.getElementById('saveName').value = target?.name || '';
  });
  document.getElementById('exportSave').onclick = () => withStatus('正在匯出版本檔案...', async () => {
    const payload = buildExportPayload();
    const safeName = (payload.save.name || 'distanceViewer-save').replace(/[^\w\u4e00-\u9fa5-]+/g, '_');
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${safeName}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }, '版本已匯出到本機。');
  document.getElementById('importSave').onclick = () => {
    document.getElementById('importFile').click();
  };
  document.getElementById('importFile').addEventListener('change', (event) => withStatus('正在匯入版本檔案...', async () => {
    const file = event.target.files?.[0];
    if (!file) throw new Error('尚未選擇檔案。');
    const text = await file.text();
    const payload = JSON.parse(text);
    importSavePayload(payload);
    applyPointMutation(() => {
      loadSelectedVersion();
    });
    await redraw();
    event.target.value = '';
  }, '匯入成功，已加入瀏覽器版本並載入。'));
  document.getElementById('clear').onclick = async () => withStatus('正在清空點位...', async () => {
    applyPointMutation(() => {
      selectedPoints = [];
      customTextBoxes = [];
    });
    await redraw();
  }, '點位與文字方塊已清空。');
  document.getElementById('undo').onclick = async () => withStatus('正在還原上一步...', async () => {
    if (!undoLastPointChange()) {
      throw new Error('目前沒有可還原的操作。');
    }
    await redraw();
  }, '已還原上一步。');
  document.getElementById('redo').onclick = async () => withStatus('正在取消還原上一步...', async () => {
    if (!redoLastPointChange()) {
      throw new Error('目前沒有可取消還原的操作。');
    }
    await redraw();
  }, '已取消還原上一步。');

  document.getElementById('chart').on('plotly_click', async (eventData) => {
    const pt = eventData.points?.[0];
    if (!pt) return;
    if (!focusMode && !annotationMode) return;
    applyPointMutation(() => {
      updatePointOnMode(pt.x, pt.y, focusMode, annotationMode);
    });
    await redraw();
  });

  document.getElementById('chart').onclick = async (e) => {
    if (focusMode || annotationMode) return;
    if (e.button !== 0) return;
    const point = clientToDataPoint(e.clientX, e.clientY);
    if (!point) return;
    const { x, y } = point;
    if (textBoxMode) {
      if (suppressNextTextBoxClick) {
        suppressNextTextBoxClick = false;
        return;
      }
      if (textBoxDragState?.moved) {
        textBoxDragState = null;
        return;
      }
      const targetIdx = findNearestTextBoxIndex(e.clientX, e.clientY);
      const changed = applyPointMutation(() => {
        if (targetIdx >= 0) {
          editTextBoxAt(targetIdx);
        } else {
          addTextBoxAt(Math.round(x), Math.round(y));
        }
      });
      if (changed) {
        await redraw();
      }
      return;
    }
    applyPointMutation(() => {
      addPoint(x, y);
    });
    await redraw();
  };

  document.getElementById('chart').oncontextmenu = async (e) => {
    e.preventDefault();
    const point = clientToDataPoint(e.clientX, e.clientY);
    if (!point) return;
    const { x, y } = point;
    if (textBoxMode) {
      const targetIdx = findNearestTextBoxIndex(e.clientX, e.clientY);
      if (targetIdx >= 0) {
        applyPointMutation(() => {
          customTextBoxes.splice(targetIdx, 1);
          selectedTextBoxIndex = -1;
        });
        await redraw();
      }
      return;
    }
    applyPointMutation(() => {
      removePoint(x, y);
    });
    await redraw();
  };
  document.getElementById('chart').addEventListener('mousedown', (e) => {
    if (!textBoxMode || e.button !== 0) return;
    const idx = findNearestTextBoxIndex(e.clientX, e.clientY);
    if (idx < 0) return;
    const point = clientToDataPoint(e.clientX, e.clientY);
    if (!point) return;
    textBoxDragState = {
      idx,
      moved: false,
      startX: point.x,
      startY: point.y,
      originX: customTextBoxes[idx].x,
      originY: customTextBoxes[idx].y,
    };
    selectedTextBoxIndex = idx;
  });
  document.addEventListener('mousemove', async (e) => {
    if (!textBoxDragState) return;
    const point = clientToDataPoint(e.clientX, e.clientY);
    if (!point) return;
    const dx = point.x - textBoxDragState.startX;
    const dy = point.y - textBoxDragState.startY;
    if (Math.hypot(dx, dy) < 0.3) return;
    textBoxDragState.moved = true;
    const idx = textBoxDragState.idx;
    customTextBoxes[idx].x = Math.max(0, Math.min(100, Math.round(textBoxDragState.originX + dx)));
    customTextBoxes[idx].y = Math.max(0, Math.min(100, Math.round(textBoxDragState.originY + dy)));
    await redraw();
  });
  document.addEventListener('mouseup', () => {
    if (!textBoxDragState) return;
    suppressNextTextBoxClick = textBoxDragState.moved;
    textBoxDragState = null;
  });
  document.addEventListener('keydown', async (event) => {
    if (!(event.ctrlKey || event.metaKey)) return;
    const key = event.key.toLowerCase();
    if (key === 'z' && !event.shiftKey) {
      event.preventDefault();
      if (!undoLastPointChange()) {
        setStatus('目前沒有可還原的操作。', true);
        return;
      }
      await redraw();
      setStatus('已還原上一步。');
      return;
    }
    if (key === 'y' || (key === 'z' && event.shiftKey)) {
      event.preventDefault();
      if (!redoLastPointChange()) {
        setStatus('目前沒有可取消還原的操作。', true);
        return;
      }
      await redraw();
      setStatus('已取消還原上一步。');
    }
  });
}

(async function init() {
  syncFocusButtonText();
  syncAnnotationButtonText();
  syncTextBoxButtonText();
  syncAnnotationVisibilityText();
  syncDistanceVisibilityText();
  syncViewControlText();
  setStatus('初始化中，請稍候...');
  refreshSaveList();
  await loadOptions();
  await redraw();
  bindEvents();
  setStatus('初始化完成。');
})();
</script>
</body>
</html>
